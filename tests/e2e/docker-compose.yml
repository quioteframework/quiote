services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ./otel-output:/var/log/otel
    ports:
      - "4318:4318"

  quiote-app:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile
    depends_on:
      - otel-collector
    ports:
      - "8180:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
