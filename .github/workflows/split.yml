name: Split packages

# Mirrors each packages/<name>/ subtree into its own standalone repo under
# quioteframework/<name> -- see docs/MONOREPO_SPLIT_PLAN.md. Uses
# acrobat/subtree-splitter (https://github.com/acrobat/subtree-splitter),
# which wraps splitsh/lite and handles installing it itself, batching
# multiple subtree splits from one config file
# (.github/subtree-splitter-config.json).
#
# Prerequisites (one-time, done outside this file):
#   1. An empty (no auto-init) GitHub repo per package listed in the config
#      file, e.g. quioteframework/mcp.
#   2. A fine-grained PAT scoped to ONLY those repos, with the single
#      permission "Contents: Read and write", stored as the repo secret
#      SPLIT_TOKEN on this (the monorepo's) repo.
#
# Rollout: only `mcp` is listed in .github/subtree-splitter-config.json.
# Verify its split repo looks right (a real composer.json at its root,
# correct history) before adding the other 8 packages
# (csrf, whoops, ratelimit, db-eloquent, db-doctrine, db-cycle,
# telemetry-otel, telemetry-dashboard) to that config's "subtree-splits" list.

on:
  push:
    branches: [main]
    paths: ['packages/**']
    tags-ignore: ['*']
  create:
    tags: ['*']
  delete:
    tags: ['*']

jobs:
  split:
    # Guard against forks/mirrors accidentally pushing into the real split repos.
    if: github.repository == 'quioteframework/quiote'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # subtree-splitter needs the full history to correctly filter
          # commits touching each packages/<name>/ -- a shallow clone would
          # silently produce an incomplete/wrong split history.
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git to authenticate pushes with SPLIT_TOKEN
        # subtree-splitter-config.json's "target" values use SSH-style
        # git@github.com:org/repo.git URLs; this rewrites any such URL to an
        # authenticated HTTPS push using the fine-grained PAT, so no SSH key
        # is needed. Plain git config (not a third-party action), so this
        # step's behavior isn't dependent on any action's exact input names.
        env:
          SPLIT_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${SPLIT_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Configure git identity for tagging
        run: |
          git config --global user.email "ci@quioteframework.org"
          git config --global user.name "Quiote CI"

      - uses: acrobat/subtree-splitter@v1.1.5
        with:
          config-path: .github/subtree-splitter-config.json
          batch-size: 1
