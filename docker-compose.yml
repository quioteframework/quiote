services:
  quiote-sample-app:
    build: .
    ports:
      - "8080:80"
    volumes:
      # Live-edit the sample app and framework source without rebuilding.
      - ./samples/app:/app/samples/app
      - ./Quiote:/app/Quiote:ro
    environment:
      - CADDY_GLOBAL_OPTIONS=debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
